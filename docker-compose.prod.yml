services:
  postgres:
    image: postgres:16
    container_name: gestorrh-postgres-prod
    environment:
      POSTGRES_DB: gestion_plantillas
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gestorrh_pgdata_prod:/var/lib/postgresql/data
    networks:
      - gestorrh-net
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  api:
    image: ghcr.io/gestorrh-multiplataforma/gestorrh-api:latest
    container_name: gestorrh-api-prod
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/gestion_plantillas
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - DB_DDL_AUTO=update
    volumes:
      - api_uploads:/app/uploads
    networks:
      - gestorrh-net
    deploy:
      resources:
        limits:
          memory: 1024m
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  gestorrh-net:
    driver: bridge

volumes:
  gestorrh_pgdata_prod:
  api_uploads: