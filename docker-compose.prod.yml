services:
  postgres:
    image: postgres:16
    container_name: gestorrh-postgres-prod
    environment:
      POSTGRES_DB: gestion_plantillas
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gestorrh_pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: gestorrh-api-prod
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/gestion_plantillas
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - DB_DDL_AUTO=update
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  gestorrh_pgdata_prod:
  api_uploads: