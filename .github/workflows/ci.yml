name: CI Pipeline API

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Tests con Maven
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn clean test

      - name: Generar Documentación (Javadoc y Swagger)
        if: github.ref == 'refs/heads/main'
        run: mvn verify javadoc:javadoc -Papi-docs -DskipTests

      - name: Construir Portal de Documentación (Javadoc + Swagger UI)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p docs_site/javadoc
          mkdir -p docs_site/swagger

          cp -r target/site/apidocs/* docs_site/javadoc/

          wget https://github.com/swagger-api/swagger-ui/archive/refs/tags/v5.11.0.tar.gz
          tar -xzf v5.11.0.tar.gz
          cp -r swagger-ui-5.11.0/dist/* docs_site/swagger/

          cp target/swagger/openapi.json docs_site/swagger/

          sed -i 's|https://petstore.swagger.io/v2/swagger.json|./openapi.json|g' docs_site/swagger/swagger-initializer.js
          
          sed -i 's|layout: "StandaloneLayout"|layout: "StandaloneLayout", tagsSorter: "alpha", operationsSorter: "method"|g' docs_site/swagger/swagger-initializer.js

          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Documentación GestorRH</title><style>body{font-family:sans-serif;text-align:center;margin-top:100px;background-color:#f4f4f9;}a{text-decoration:none;color:white;background:#4CAF50;padding:15px 25px;border-radius:5px;font-size:18px;margin:15px;display:inline-block;box-shadow: 0 4px 6px rgba(0,0,0,0.1);transition: background 0.3s;}a:hover{background:#45a049;}a.java{background:#e76f00;}a.java:hover{background:#c45e00;}</style></head><body><h1>GestorRH API - Portal de Documentación</h1><p>Selecciona la documentación técnica que deseas consultar:</p><br><a href="swagger/index.html">API REST (Swagger UI)</a><a href="javadoc/index.html" class="java">Código Java (Javadoc)</a></body></html>' > docs_site/index.html

      - name: Desplegar en GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs_site
          commit_message: "docs: despliegue unificado de Javadoc y Swagger"