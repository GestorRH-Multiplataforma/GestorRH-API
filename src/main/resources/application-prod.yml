spring:
  datasource:
    # Si la variable DB_URL existe, la usa. Si no, usa localhost.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gestion_plantillas}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:validate}
    show-sql: false

logging:
  level:
    root: INFO
    com.gestorrh.api: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000